<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin CRUD</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:1100px;margin:20px auto;padding:0 16px;}
    input,button{padding:10px;margin:6px 0;}
    table{border-collapse:collapse;width:100%;margin-top:16px;}
    th,td{border:1px solid #ddd;padding:8px;}
    th{background:#f4f4f4;}
    img{max-width:80px;max-height:60px;object-fit:cover;}
    .row{display:flex;gap:12px;flex-wrap:wrap;}
    .col{flex:1;min-width:260px;}
    .btn{background:#2d7d46;color:#fff;border:0;cursor:pointer;}
    .btn-secondary{background:#555;color:#fff;border:0;cursor:pointer;}
    .btn-danger{background:#d9534f;color:#fff;border:0;cursor:pointer;}
    .hidden{display:none;}
    .muted{color:#666;}
  </style>
</head>
<body>
  <h2>Panel Admin - CRUD Google Sheets</h2>
  <p class="muted">Incluye Crear/Editar/Eliminar. Usa Cloudinary y Apps Script CRUD (action=list/create/update/delete).</p>

  <div class="row">
    <div class="col">
      <h3 id="modeTitle">Crear</h3>
      <input type="hidden" id="id" />
      <input id="nombre" placeholder="Nombre" />
      <input id="telefono" placeholder="Telefono" />
      <input type="file" id="imagen" />

      <div>
        <button class="btn" id="btnCreate" onclick="createNow()">Crear</button>
        <button class="btn-secondary hidden" id="btnUpdate" onclick="updateNow()">Actualizar</button>
        <button class="btn-secondary" onclick="resetForm()">Cancelar</button>
      </div>
      <p id="mensaje"></p>
    </div>
  </div>

  <h3>Contactos</h3>
  <button class="btn-secondary" onclick="loadList()">Recargar</button>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Imagen</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <script>
    // ====== CONFIG ======
    // Debe ser el deployment publicado que termina en /exec
    const scriptURL = "https://script.google.com/macros/s/AKfycbz7L4ZXK1h6hw-Eh-lzOXVMVXu52ghsy2UYDyHXqbsUsN4-DGXx6nqihx0xH45Ujf4/exec";

    const CLOUDINARY_UPLOAD_PRESET = "contactos_app";
    const CLOUDINARY_UPLOAD_URL = "https://api.cloudinary.com/v1_1/dm2q4hcus/image/upload";

    const $ = (id) => document.getElementById(id);

    function setModeCreate(){
      $("modeTitle").textContent = "Crear";
      $("btnCreate").classList.remove("hidden");
      $("btnUpdate").classList.add("hidden");
    }

    function setModeUpdate(){
      $("modeTitle").textContent = "Actualizar";
      $("btnCreate").classList.add("hidden");
      $("btnUpdate").classList.remove("hidden");
    }

    function resetForm(){
      $("id").value = "";
      $("nombre").value = "";
      $("telefono").value = "";
      $("imagen").value = "";
      $("mensaje").textContent = "";
      setModeCreate();
    }

    async function uploadToCloudinary(){
      const file = $("imagen").files[0];
      if(!file) return "";

      const fd = new FormData();
      fd.append("file", file);
      fd.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

      const res = await fetch(CLOUDINARY_UPLOAD_URL,{method:"POST",body:fd});
      const data = await res.json();
      return data.secure_url || "";
    }

    function buildURL(params){
      const qs = new URLSearchParams(params);
      return scriptURL + "?" + qs.toString();
    }

    // --- IMPORTANTE: CORS ---
    // Si haces fetch a script.google.com desde http://127.0.0.1:5500, tendrás CORS.
    // Solución: para CRUD de verdad, el backend debe agregar headers CORS.
    // Aquí evitamos CORS para CREATE/UPDATE/DELETE usando window.open.
    // Para LIST (necesitas JSON), o agregas CORS en Apps Script, o haces LIST con un endpoint que no use fetch.

    function submitAction(action, extra){
      const finalURL = buildURL({
        ...extra,
        action
      });
      window.open(finalURL, "_blank");
    }

    async function loadList(){
      // Como no podemos usar fetch por CORS sin headers,
      // abrimos el endpoint en nueva pestaña para ver el JSON.
      // (Opcional: si agregas CORS en Apps Script, reemplazo esto por fetch.)
      $("tbody").innerHTML = "";
      $("mensaje").textContent = "Abriendo lista en nueva pestaña (JSON)...";
      submitAction("list", {});

      // Limpia el mensaje luego de un rato
      setTimeout(()=> $("mensaje").textContent = "" , 1500);
    }

    function editRow(id, nombre, telefono){
      $("id").value = id;
      $("nombre").value = nombre;
      $("telefono").value = telefono;
      setModeUpdate();
    }

    async function createNow(){
      const nombre = $("nombre").value.trim();
      const telefono = $("telefono").value.trim();
      if(!nombre || !telefono){ $("mensaje").textContent = "Completa nombre y telefono"; return; }

      $("mensaje").textContent = "Subiendo imagen y creando...";
      const imagen = await uploadToCloudinary();

      submitAction("create", { nombre, telefono, imagen });
      $("mensaje").textContent = "Creado (revisa la hoja).";
      resetForm();
    }

    async function updateNow(){
      const id = $("id").value;
      const nombre = $("nombre").value.trim();
      const telefono = $("telefono").value.trim();
      if(!id){ $("mensaje").textContent = "Selecciona un registro"; return; }
      if(!nombre || !telefono){ $("mensaje").textContent = "Completa nombre y telefono"; return; }

      $("mensaje").textContent = "Subiendo imagen y actualizando...";
      const imagen = await uploadToCloudinary();

      submitAction("update", { id, nombre, telefono, imagen });
      $("mensaje").textContent = "Actualizado (revisa la hoja).";
      resetForm();
    }

    function deleteRow(id){
      if(!confirm("¿Eliminar ID="+id+"?")) return;
      submitAction("delete", { id });
      $("mensaje").textContent = "Eliminado (revisa la hoja).";
      resetForm();
    }

    // init
    setModeCreate();
  </script>
</body>
</html>

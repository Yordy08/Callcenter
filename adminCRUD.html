<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin CRUD</title>

<style>
body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    max-width:1100px;
    margin:0 auto;
    padding:30px 20px;
    background: linear-gradient(135deg, #eef2f3, #d9e4f5);
    color:#222;
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:28px;
    font-weight:700;
}

/* INPUTS */
input,button{
    padding:12px;
    margin:6px 4px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
    font-size:14px;
}

input{
    background:#fff;
    transition:0.2s;
}

input:focus{
    border-color:#4a90e2;
    box-shadow:0 0 6px rgba(74,144,226,0.4);
}

/* BOTONES */
button{
    cursor:pointer;
    transition:0.2s;
    border:none;
}

.btn{
    background: linear-gradient(135deg, #28a745, #1e7e34);
    color:white;
}

.btn-danger{
    background: linear-gradient(135deg, #dc3545, #b02a37);
    color:white;
}

button:hover{
    opacity:0.9;
    transform:scale(1.03);
}

/* TABLA */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:25px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

th{
    background:#2d3436;
    color:white;
}

tr:hover{
    background:#f1f5f9;
}

/* IMAGEN */
img{
    width:70px;
    height:55px;
    object-fit:cover;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.hidden{
    display:none;
}

#mensaje{
    margin-top:10px;
    font-weight:600;
    text-align:center;
}

hr{
    margin:30px 0;
    border:0;
    height:1px;
    background:#ccc;
}

td button{
    padding:8px 10px;
    font-size:13px;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>📋 Panel Admin CRUD</h2>

<input type="hidden" id="id">

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="telefono" placeholder="Teléfono">
<input type="file" id="imagen">

<br>

<button class="btn" id="btnCreate" onclick="createNow()">Crear</button>
<button class="btn hidden" id="btnUpdate" onclick="updateNow()">Actualizar</button>
<button onclick="resetForm()">Cancelar</button>

<p id="mensaje"></p>

<hr>

<h3>📦 Lista de contactos</h3>
<button onclick="loadList()">Recargar lista</button>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody id="tbody"></tbody>
</table>

<script>
//====================================
// CONFIG
//====================================
const scriptURL =
"https://script.google.com/macros/s/AKfycbziUmZrBavBkQMHOqCSDgoqW-0W2X7-Yh5GOpqpkKMeQdiE7EvDDBawP8di5YRAzCQB/exec";

const CLOUDINARY_UPLOAD_PRESET = "contactos_app";
const CLOUDINARY_UPLOAD_URL =
"https://api.cloudinary.com/v1_1/dm2q4hcus/image/upload";


//====================================
// HELPERS
//====================================
function $(id){
    return document.getElementById(id);
}

function resetForm(){
    $("id").value="";
    $("nombre").value="";
    $("telefono").value="";
    $("imagen").value="";
    $("mensaje").textContent="";

    $("btnCreate").classList.remove("hidden");
    $("btnUpdate").classList.add("hidden");
}

function setUpdateMode(){
    $("btnCreate").classList.add("hidden");
    $("btnUpdate").classList.remove("hidden");
}


//====================================
// CLOUDINARY
//====================================
async function uploadToCloudinary(){

    const file = $("imagen").files[0];

    if(!file){
        return "";
    }

    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

    const response = await fetch(CLOUDINARY_UPLOAD_URL,{
        method:"POST",
        body:formData
    });

    const data = await response.json();

    return data.secure_url;
}


//====================================
// CREATE
//====================================
async function createNow(){

    const nombre = $("nombre").value.trim();
    const telefono = $("telefono").value.trim();

    if(!nombre || !telefono){
        $("mensaje").textContent="Completa todos los campos";
        return;
    }

    try{
        $("mensaje").textContent="Subiendo imagen...";

        const imagen = await uploadToCloudinary();

        const url =
            `${scriptURL}?action=create`+
            `&nombre=${encodeURIComponent(nombre)}`+
            `&telefono=${encodeURIComponent(telefono)}`+
            `&imagen=${encodeURIComponent(imagen)}`;

        window.open(url,"_blank");

        $("mensaje").textContent="✅ Creado";

        resetForm();
        setTimeout(loadList,1000);

    }catch(err){
        $("mensaje").textContent="Error";
        console.log(err);
    }
}


//====================================
// LISTAR
//====================================
function loadList(){

    const script = document.createElement("script");
    script.src = `${scriptURL}?action=list&callback=renderContacts`;
    document.body.appendChild(script);
}


//====================================
// RENDER
//====================================
function renderContacts(data){

    const tbody = $("tbody");
    tbody.innerHTML="";

    data.forEach(c=>{

        tbody.innerHTML += `
        <tr>
            <td>${c.id}</td>
            <td><img src="${c.imagen}"></td>
            <td>${c.nombre}</td>
            <td>${c.telefono}</td>
            <td>
                <button onclick="editContact('${c.id}','${c.nombre}','${c.telefono}')">Editar</button>
                <button class="btn-danger" onclick="deleteRow('${c.id}')">Eliminar</button>
            </td>
        </tr>`;
    });
}


//====================================
// EDIT
//====================================
function editContact(id,nombre,telefono){

    $("id").value=id;
    $("nombre").value=nombre;
    $("telefono").value=telefono;

    setUpdateMode();
}


//====================================
// UPDATE
//====================================
async function updateNow(){

    const id = $("id").value;
    const nombre = $("nombre").value.trim();
    const telefono = $("telefono").value.trim();

    const imagen = await uploadToCloudinary();

    const url =
        `${scriptURL}?action=update`+
        `&id=${id}`+
        `&nombre=${encodeURIComponent(nombre)}`+
        `&telefono=${encodeURIComponent(telefono)}`+
        `&imagen=${encodeURIComponent(imagen)}`;

    window.open(url,"_blank");

    resetForm();
    setTimeout(loadList,1000);
}


//====================================
// DELETE
//====================================
function deleteRow(id){

    const url = `${scriptURL}?action=delete&id=${id}`;

    window.open(url,"_blank");

    setTimeout(loadList,1000);
}


// INIT
loadList();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llamada Directa</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#74ebd5,#ACB6E5);
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}

.contacto{
  width:280px;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
  text-align:center;
}

.foto{
  width:100%;
  height:220px;
  object-fit:cover;
}

.nombre{
  font-size:20px;
  font-weight:bold;
  margin:15px;
}

.btn{
  display:inline-block;
  margin-bottom:20px;
  padding:10px 25px;
  background:green;
  color:white;
  text-decoration:none;
  border-radius:50px;
}
</style>
</head>
<body>

<div id="contenedor"></div>

<script>
const API_URL = "TU_URL_DE_APPS_SCRIPT";

async function cargarContactos() {
  try {
    const res = await fetch(API_URL);
    const contactos = await res.json();

    const contenedor = document.getElementById("contenedor");
    contenedor.innerHTML = "";

    contactos.forEach(contacto => {
      contenedor.innerHTML += `
        <div class="contacto">
          <img src="${contacto.imagen}" class="foto">
          <div class="nombre">${contacto.nombre}</div>
          <a href="tel:+57${contacto.telefono}" class="btn">
            📞 LLAMAR
          </a>
        </div>
      `;
    });

  } catch(error){
    console.log(error);
  }
}

cargarContactos();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta 
  name="viewport" 
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>
<title>Contactos</title>


<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00c853">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
  background:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100%;
  background:#111;
  padding-top:60px;
  transition:0.3s;
  z-index:1000;
}

.sidebar a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar a:hover{
  background:#28a745;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

/* LOGIN */
#menuLogin{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:260px;
}

.box input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

.box button{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* CARDS */
#contenedor{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  width:260px;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  max-height:500px;
  height:auto;
  object-fit:contain;
  background:#f5f5f5;
}

.info{
  padding:15px;
  text-align:center;
}

.nombre{
  font-size:18px;
  font-weight:bold;
}

.telefono{
  color:#666;
  margin-top:5px;
}

.btn{
  display:inline-block;
  margin-top:12px;
  padding:10px 20px;
  background:green;
  color:white;
  border-radius:50px;
  text-decoration:none;
}

.loading{
  text-align:center;
  padding:30px;
  font-size:18px;
  color:white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="menuLogin">
  <div class="box">
    <h3>Acceso Admin</h3>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="checkMenu()">Entrar</button>
    <p id="error" style="color:red"></p>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="index.html">🏠 Inicio</a>
  <a href="org.html">📁 Org</a>
  <a href="admin.html">⚙️ Admin</a>
  <a href="adminCRUD.html">🧋 CRUD</a>
  <a href="#" onclick="closeMenu()">❌ Cerrar</a>
</div>

<!-- HEADER -->
<header>
  <h3>📇 Contactos</h3>
  <button class="menu-btn" onclick="openMenu()">☰</button>
</header>

<div class="loading" id="loading">
  Cargando contactos...
</div>

<div id="contenedor"></div>
<script>
let menuUnlocked = false;
let loginTimer = null;

/* MENU */
function openMenu(){
  if(menuUnlocked){
    showMenu();
    return;
  }

  document.getElementById("menuLogin").style.display = "flex";
  document.getElementById("pass").value = "";
  document.getElementById("error").innerText = "";

  clearTimeout(loginTimer);

  loginTimer = setTimeout(() => {
    closeLogin();
  }, 5000);
}

function checkMenu(){
  const pass = document.getElementById("pass").value;

  if(pass === "admin"){
    menuUnlocked = true;
    clearTimeout(loginTimer);
    document.getElementById("menuLogin").style.display = "none";
    showMenu();
  }else{
    document.getElementById("error").innerText = "Contraseña incorrecta";
  }
}

function closeLogin(){
  document.getElementById("menuLogin").style.display = "none";
  document.getElementById("error").innerText = "";
  clearTimeout(loginTimer);
}

function showMenu(){
  document.getElementById("sidebar").style.left = "0";
  document.getElementById("overlay").style.display = "block";
}

function closeMenu(){
  document.getElementById("sidebar").style.left = "-260px";
  document.getElementById("overlay").style.display = "none";
}


/* =========================
   API
========================= */

const scriptURL =
"https://script.google.com/macros/s/AKfycbxCOhWQ4FkMckemEFyKaR6WLyJEXcHafbhyGdBXixL5s28DkuHMkK29jiGKG0jeybm9/exec";

const CONTACTS_CACHE_KEY = "contacts_cache_v3";
const RECENT_CALLS_KEY = "recent_calls_order";

/* cargar lista */
function loadList(){
  document.getElementById("loading").style.display = "block";

  const cached = localStorage.getItem(CONTACTS_CACHE_KEY);

  if(cached){
    try{
      renderContacts(JSON.parse(cached));
    }catch(e){
      console.log(e);
    }
  }

  syncNow();
}


/* JSONP */
function syncNow(){

  if(!navigator.onLine){
    document.getElementById("loading").style.display = "none";
    return;
  }

  const oldScript = document.getElementById("jsonpScript");

  if(oldScript){
    oldScript.remove();
  }

  const script = document.createElement("script");
  script.id = "jsonpScript";

  script.src =
    `${scriptURL}?action=list` +
    `&callback=handleContacts` +
    `&nocache=${Date.now()}`;

  script.onerror = function(){
    console.log("Error cargando datos");
    document.getElementById("loading").style.display = "none";
  };

  document.body.appendChild(script);
}


/* respuesta JSONP */
function handleContacts(data){
  renderContacts(data);
  document.getElementById("loading").style.display = "none";
}


/* guardar llamada reciente */
function saveRecentCall(id, telefono){

  let recentCalls = JSON.parse(
    localStorage.getItem(RECENT_CALLS_KEY)
  ) || [];

  // eliminar duplicado si existe
  recentCalls = recentCalls.filter(item => item !== String(id));

  // poner de primero
  recentCalls.unshift(String(id));

  // limitar historial
  recentCalls = recentCalls.slice(0, 50);

  localStorage.setItem(
    RECENT_CALLS_KEY,
    JSON.stringify(recentCalls)
  );

  // recargar lista inmediatamente
  const cached = localStorage.getItem(CONTACTS_CACHE_KEY);

  if(cached){
    renderContacts(JSON.parse(cached));
  }

  // abrir llamada después
  setTimeout(() => {
    window.location.href = `tel:+57${telefono}`;
  }, 300);
}


/* render */
function renderContacts(data){

  try{
    localStorage.setItem(
      CONTACTS_CACHE_KEY,
      JSON.stringify(data)
    );
  }catch(e){
    console.log(e);
  }

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  if(!data || !data.length){
    contenedor.innerHTML = `
      <div class="loading">
        No hay contactos registrados
      </div>
    `;
    return;
  }

  const recentCalls = JSON.parse(
    localStorage.getItem(RECENT_CALLS_KEY)
  ) || [];

  /* ordenar recientes primero */
  data.sort((a, b) => {
    const aIndex = recentCalls.indexOf(String(a.id));
    const bIndex = recentCalls.indexOf(String(b.id));

    if(aIndex === -1 && bIndex === -1) return 0;
    if(aIndex === -1) return 1;
    if(bIndex === -1) return -1;

    return aIndex - bIndex;
  });

  data.forEach(c => {
    contenedor.innerHTML += `
      <div class="card">
        <img src="${c.imagen}" alt="${c.nombre}">
        
        <div class="info">
          <div class="nombre">${c.nombre}</div>
          <div class="telefono">${c.telefono}</div>

          <button 
            class="btn"
            onclick="saveRecentCall('${c.id}','${c.telefono}')"
          >
            📞 Llamar
          </button>
        </div>
      </div>
    `;
  });
}


/* vuelve internet */
window.addEventListener("online", () => {
  syncNow();
});


if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("/service-worker.js")
      .then((reg) => {
        console.log("Service Worker registrado:", reg);
      })
      .catch((err) => {
        console.log("Error registrando SW:", err);
      });
  });
}


/* iniciar */
window.onload = function(){
  loadList();
};
</script>
</body>
</html>

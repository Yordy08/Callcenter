<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contactos</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(10px);
}

/* MENU BTN */
.menu-btn{
  font-size:22px;
  cursor:pointer;
  background:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100%;
  background:#111;
  padding-top:60px;
  transition:0.3s;
  z-index:1000;
}

.sidebar a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar a:hover{
  background:#28a745;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

/* LOGIN */
#menuLogin{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
}

.box{
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:260px;
}

.box input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

.box button{
  margin-top:10px;
  width:100%;
  padding:10px;
  background:green;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* CARDS */
#contenedor{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  width:260px;
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.info{
  padding:15px;
  text-align:center;
}

.nombre{
  font-size:18px;
  font-weight:bold;
}

.telefono{
  color:#666;
  margin-top:5px;
}

.btn{
  display:inline-block;
  margin-top:12px;
  padding:10px 20px;
  background:green;
  color:white;
  border-radius:50px;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="menuLogin">
  <div class="box">
    <h3>Acceso Admin</h3>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="checkMenu()">Entrar</button>
    <p id="error" style="color:red"></p>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <a href="index.html">🏠 Inicio</a>
  <a href="org.html">📁 Org</a>
  <a href="admin.html">⚙️ Admin</a>
  <a href="adminCRUD.html">📋 CRUD</a>
  <a href="#" onclick="closeMenu()">❌ Cerrar</a>
</div>

<!-- HEADER -->
<header>
  <h3>📇 Contactos</h3>
  <button class="menu-btn" onclick="openMenu()">☰</button>
</header>

<!-- CONTENEDOR -->
<div id="contenedor"></div>

<script>

let menuUnlocked = false;
let loginTimer = null;

/* ABRIR MENÚ */
function openMenu(){

  if(menuUnlocked){
    showMenu();
    return;
  }

  document.getElementById("menuLogin").style.display = "flex";
  document.getElementById("pass").value = "";
  document.getElementById("error").innerText = "";

  clearTimeout(loginTimer);

  loginTimer = setTimeout(() => {
    closeLogin();
  }, 5000);
}

/* LOGIN */
function checkMenu(){

  const pass = document.getElementById("pass").value;

  if(pass === "admin"){
    menuUnlocked = true;

    clearTimeout(loginTimer);
    document.getElementById("menuLogin").style.display = "none";

    showMenu();
  }else{
    document.getElementById("error").innerText = "Contraseña incorrecta";
  }
}

/* CERRAR LOGIN */
function closeLogin(){
  document.getElementById("menuLogin").style.display = "none";
  document.getElementById("error").innerText = "";
  clearTimeout(loginTimer);
}

/* MOSTRAR MENU */
function showMenu(){
  document.getElementById("sidebar").style.left = "0";
  document.getElementById("overlay").style.display = "block";
}

/* CERRAR MENU */
function closeMenu(){
  document.getElementById("sidebar").style.left = "-260px";
  document.getElementById("overlay").style.display = "none";
}

/* API */
const scriptURL =
"https://script.google.com/macros/s/AKfycbziUmZrBavBkQMHOqCSDgoqW-0W2X7-Yh5GOpqpkKMeQdiE7EvDDBawP8di5YRAzCQB/exec";

function loadList(){

  const old = document.getElementById("jsonp");
  if(old) old.remove();

  const script = document.createElement("script");
  script.id = "jsonp";
  script.src = `${scriptURL}?action=list&callback=renderContacts`;

  document.body.appendChild(script);
}

function renderContacts(data){

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  data.forEach(c => {

    contenedor.innerHTML += `
      <div class="card">
        <img src="${c.imagen}">
        <div class="info">
          <div class="nombre">${c.nombre}</div>
          <div class="telefono">${c.telefono}</div>

          <a class="btn" href="tel:+57${c.telefono}">
            📞 Llamar
          </a>
        </div>
      </div>
    `;
  });
}

loadList();

</script>

</body>
</html>

<link rel="apple-touch-icon" href="https://png.pngtree.com/png-vector/20250917/ourmid/pngtree-3d-red-phone-call-icon-hang-up-or-end-symbol-png-image_17482051.webp" sizes="512x512" type="image/png">
</div>

<script>
let menuUnlocked = false;
let loginTimer = null;

/* ABRIR MENÚ */
function openMenu(){

  if(menuUnlocked){
    showMenu();
    return;
  }

  document.getElementById("menuLogin").style.display = "flex";
  document.getElementById("pass").value = "";
  document.getElementById("error").innerText = "";

  clearTimeout(loginTimer);

  loginTimer = setTimeout(() => {
    closeLogin();
  }, 5000);
}

/* LOGIN */
function checkMenu(){

  const pass = document.getElementById("pass").value;

  if(pass === "admin"){
    menuUnlocked = true;

    clearTimeout(loginTimer);
    document.getElementById("menuLogin").style.display = "none";

    showMenu();
  }else{
    document.getElementById("error").innerText = "Contraseña incorrecta";
  }
}

/* CERRAR LOGIN */
function closeLogin(){
  document.getElementById("menuLogin").style.display = "none";
  document.getElementById("error").innerText = "";
  clearTimeout(loginTimer);
}

/* MOSTRAR MENU */
function showMenu(){
  document.getElementById("sidebar").style.left = "0";
  document.getElementById("overlay").style.display = "block";
}

/* CERRAR MENU */
function closeMenu(){
  document.getElementById("sidebar").style.left = "-260px";
  document.getElementById("overlay").style.display = "none";
}

</script>

<!-- Lógica de sincronización separada -->
<script src="client-sync.js"></script>
  text-decoration:none;
}

</head>

    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="checkMenu()">Entrar</button>
    <p id="error" style="color:red"></p>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->

  <a href="adminCRUD.html">🧋 CRUD</a>
  <a href="#" onclick="closeMenu()">❌ Cerrar</a>
</div>

<!-- HEADER -->
<header>
  <h3>📇 Contactos</h3>
  <button class="menu-btn" onclick="openMenu()">☰</button>
</header>

<!-- CONTENEDOR -->
<div id="contenedor"></div>

<script>

let menuUnlocked = false;
let loginTimer = null;

/* ABRIR MENÚ */
function openMenu(){

  if(menuUnlocked){
    showMenu();
    return;
  }

  document.getElementById("menuLogin").style.display = "flex";
  document.getElementById("pass").value = "";
  document.getElementById("error").innerText = "";

  clearTimeout(loginTimer);

  loginTimer = setTimeout(() => {
    closeLogin();
  }, 5000);
}

/* LOGIN */
function checkMenu(){

  const pass = document.getElementById("pass").value;

  if(pass === "admin"){
    menuUnlocked = true;

    clearTimeout(loginTimer);
    document.getElementById("menuLogin").style.display = "none";

    showMenu();
  }else{
    document.getElementById("error").innerText = "Contraseña incorrecta";
  }
}

/* CERRAR LOGIN */
function closeLogin(){
  document.getElementById("menuLogin").style.display = "none";
  document.getElementById("error").innerText = "";
  clearTimeout(loginTimer);
}

/* MOSTRAR MENU */
function showMenu(){
  document.getElementById("sidebar").style.left = "0";
  document.getElementById("overlay").style.display = "block";
}

/* CERRAR MENU */
function closeMenu(){
  document.getElementById("sidebar").style.left = "-260px";
  document.getElementById("overlay").style.display = "none";
}

/* API */
const scriptURL =
"https://script.google.com/macros/s/AKfycbxCOhWQ4FkMckemEFyKaR6WLyJEXcHafbhyGdBXixL5s28DkuHMkK29jiGKG0jeybm9/exec";

const CONTACTS_CACHE_KEY = 'contacts_cache_v1';

function loadList(){
  // 1) Mostrar desde caché local inmediatamente (sirve para “sin internet”)
  const cached = localStorage.getItem(CONTACTS_CACHE_KEY);
  if(cached){
    try{
      renderContacts(JSON.parse(cached));
    }catch(e){}
  }

  // 2) Intentar cargar desde Google (si hay internet)
  // Nota: hacemos sync también al reconectar (ver listener abajo)
  syncNow();

  // 3) Además reintentar un par de veces (a veces el primer fetch al reconectar falla)
  setTimeout(syncNow, 2000);
  setTimeout(syncNow, 5000);
}



function syncNow(){
  if(!navigator.onLine) return;

  const url = `${scriptURL}?action=list&nocache=${Date.now()}`;

  // Evitar caché vieja en fetch (y forzar revalidación)
  fetch(url, { cache: 'no-store' })
    .then(res => {
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(payload => {
      // tu backend devuelve {ok:true,data:[...]}
      if(payload && payload.ok && payload.data){
        renderContacts(payload.data);
        return;
      }
      renderContacts(payload);
    })
    .catch(() => {
      // si falla dejamos lo que ya se mostró desde localStorage
    });
}


function renderContacts(data){
  // Guardar para offline
  try{
    localStorage.setItem(CONTACTS_CACHE_KEY, JSON.stringify(data));
  }catch(e){}

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  data.forEach(c => {
    contenedor.innerHTML += `
      <div class="card">
        <img src="${c.imagen}">
        <div class="info">
          <div class="nombre">${c.nombre}</div>
          <div class="telefono">${c.telefono}</div>

          <a class="btn" href="tel:+57${c.telefono}">
            📞 Llamar
          </a>
        </div>
      </div>
    `;
  });
}

loadList();

// Registrar Service Worker para evitar código/recursos viejos
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(() => {});
}

window.addEventListener('online', () => syncNow());

</script>


</body>
</html>
